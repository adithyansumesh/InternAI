services:
  - type: web
    name: internai-api
    runtime: python
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
      - key: PROJECT_NAME
        value: "AI Internship Discovery Backend"
      - key: VERSION
        value: "1.0.0"
      - key: ENVIRONMENT
        value: "production"
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: ALLOWED_ORIGINS
        value: '["*"]'
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "llama-3.1-8b-instant"
      - key: OPENAI_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: REDIS_URL
        value: ""
      - key: DATABASE_URL
        value: "sqlite:///./data/internai.db"
